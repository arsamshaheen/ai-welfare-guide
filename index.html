<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mapping the AI Welfare Frontier</title>
<meta name="description" content="A structured onboarding resource for researchers, practitioners, and policymakers engaging with AI welfare. Theories, vocabulary, and the published range of expert views."/>
<meta name="author" content="Lydia Shi, Arsam Shaheen, Julia Bossmann"/>
<meta name="theme-color" content="#fafaf9"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231d3557'/%3E%3Ctext x='16' y='22' font-family='Inter,system-ui,sans-serif' font-size='15' font-weight='700' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#fafaf9;
  --bg-panel:#f5f5f4;
  --surface:#ffffff;
  --border:#e7e5e4;
  --border-strong:#d6d3d1;
  --ink:#0c0a09;
  --ink-2:#1c1917;
  --dim:#44403c;
  --muted:#6b6561;
  --faint:#a8a29e;
  --accent:#1d3557;
  --accent-2:#2a4a73;
  --accent-soft:rgba(29,53,87,0.06);
  --accent-border:rgba(29,53,87,0.18);
  --sage:#4a5d47;
  --rule:rgba(12,10,9,0.08);
  --focus:rgba(29,53,87,0.35);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter','-apple-system',BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  font-feature-settings:"ss01","cv11";
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.55;
}

h1,h2,h3,h4{font-family:'Inter',sans-serif;font-weight:600;letter-spacing:-0.01em;color:var(--ink)}
h1{font-weight:700;letter-spacing:-0.02em}

.serif-body{font-family:'Source Serif 4',Georgia,serif;font-weight:400}
.serif-body p{font-size:16px;line-height:1.7;color:var(--dim);margin-bottom:14px}
.serif-body p:last-child{margin-bottom:0}

button,input,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer}
::selection{background:rgba(29,53,87,0.18);color:var(--ink)}

/* Focus visibility */
:focus{outline:none}
:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:4px}

.bg-paper{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(to bottom,transparent 95%,rgba(12,10,9,0.015) 95%,rgba(12,10,9,0.015) 100%);background-size:100% 28px}

.topbar{
  border-bottom:1px solid var(--border);
  background:rgba(250,250,249,0.88);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:50;
}
.topbar-inner{max-width:1080px;margin:0 auto;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:12px;background:none;border:none;padding:2px 4px;text-decoration:none;color:var(--ink);border-radius:6px}
.brand:hover .brand-name{color:var(--accent)}
.brand-mark{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:'Inter',sans-serif;letter-spacing:-0.03em;flex-shrink:0}
.brand-name{font-weight:600;font-size:14.5px;letter-spacing:-0.01em;line-height:1.2;transition:color 0.15s}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}
.top-meta{font-size:11px;color:var(--muted);letter-spacing:0.03em;text-transform:uppercase;font-weight:500;text-align:right}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:28px;
  margin-bottom:16px;
  transition:border-color 0.2s;
}
.card-plain{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:22px 26px;
  margin-bottom:16px;
}
.card-accent{
  background:var(--accent-soft);
  border:1px solid var(--accent-border);
  border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;
  padding:20px 24px;
  margin-bottom:16px;
}
.card h2{font-size:17px;margin-bottom:10px;color:var(--ink)}
.card h3{font-size:14px;margin-bottom:6px;color:var(--ink)}

.btn-primary{
  background:var(--accent);color:#fff;border:none;
  padding:11px 22px;border-radius:6px;
  font-weight:500;font-size:13.5px;
  letter-spacing:0.005em;
  transition:background 0.15s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary:hover{background:var(--accent-2)}

.btn-ghost{
  background:transparent;border:1px solid var(--border-strong);color:var(--dim);
  padding:10px 22px;border-radius:6px;
  font-size:13.5px;font-weight:500;
  transition:border-color 0.15s,color 0.15s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

.back-btn{
  background:none;border:none;color:var(--muted);
  font-size:12px;padding:4px 4px;margin-bottom:20px;
  font-weight:500;letter-spacing:0.01em;border-radius:4px;
}
.back-btn:hover{color:var(--accent)}

.nav-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:22px 24px;
  cursor:pointer;
  transition:border-color 0.2s,transform 0.2s;
  display:block;
  text-align:left;
  width:100%;
  color:inherit;
}
.nav-card:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.nav-kicker{font-size:10px;letter-spacing:0.08em;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.nav-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:5px}
.nav-desc{font-size:12.5px;color:var(--muted);line-height:1.55}

.exp-opt{
  padding:14px 18px;border-radius:6px;
  border:1px solid var(--border);
  background:var(--surface);
  text-align:left;width:100%;
  transition:border-color 0.15s,background 0.15s;
  color:inherit;
}
.exp-opt:hover{border-color:var(--border-strong)}
.exp-opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.exp-opt .exp-label{font-weight:600;font-size:13.5px;color:var(--ink);margin-bottom:3px}
.exp-opt.sel .exp-label{color:var(--accent)}
.exp-opt .exp-desc{font-size:12px;color:var(--muted)}

.chip{
  display:inline-flex;align-items:center;
  font-size:11px;padding:3px 9px;border-radius:4px;
  font-weight:500;letter-spacing:0.01em;
  background:var(--bg-panel);color:var(--dim);
  border:1px solid var(--border);
}
.chip-neutral{background:rgba(74,93,71,0.08);color:#3d4f3a;border-color:rgba(74,93,71,0.2)}
.chip-bio{background:rgba(122,62,45,0.06);color:#7a3e2d;border-color:rgba(122,62,45,0.2)}
.chip-amb{background:rgba(133,77,14,0.06);color:#854d0e;border-color:rgba(133,77,14,0.2)}
.chip-emb{background:rgba(109,40,89,0.06);color:#6d2859;border-color:rgba(109,40,89,0.2)}
.chip-yes{background:rgba(29,53,87,0.06);color:var(--accent);border-color:rgba(29,53,87,0.2)}
.chip-partial{background:rgba(133,77,14,0.06);color:#854d0e;border-color:rgba(133,77,14,0.2)}
.chip-theor{background:rgba(120,113,108,0.08);color:var(--muted);border-color:rgba(120,113,108,0.2)}
.chip-cite{background:transparent;color:var(--muted);border-color:var(--border)}

.exp-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:18px 22px;
  margin-bottom:8px;
  width:100%;text-align:left;color:inherit;
  transition:border-color 0.2s;
}
.exp-card:hover{border-color:var(--border-strong)}
.exp-card[aria-expanded="true"]{border-color:var(--accent-border)}

.stance-code{font-weight:700;font-size:13px;letter-spacing:0.01em;color:var(--accent)}
.stance-name{font-size:13px;color:var(--dim);font-weight:500}
.stance-short-desc{font-family:'Source Serif 4',Georgia,serif;font-size:13px;color:var(--muted);line-height:1.55;margin-top:4px;font-style:italic}

.chev{font-size:10px;color:var(--faint);transition:transform 0.2s;display:inline-block;line-height:1}
.chev.open{transform:rotate(180deg)}

.fam-header{
  display:flex;align-items:baseline;gap:10px;
  margin:22px 0 10px;padding-bottom:8px;
  border-bottom:1px solid var(--rule);
}
.fam-code{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--accent);text-transform:uppercase}
.fam-name{font-size:12.5px;color:var(--muted);font-weight:500}

.read-mark{
  width:20px;height:20px;border-radius:4px;
  border:1.5px solid var(--border-strong);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;flex-shrink:0;
  transition:all 0.15s;padding:0;
}
.read-mark:hover{border-color:var(--accent)}
.read-mark.marked{background:var(--accent);border-color:var(--accent)}

.est-card{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:22px 26px;margin-bottom:12px;
}
.est-who{font-weight:600;font-size:14.5px;color:var(--ink)}
.est-when{font-size:12px;color:var(--muted);margin-top:2px}
.est-range{
  font-family:'Inter',sans-serif;font-weight:600;
  font-size:20px;color:var(--accent);
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.01em;
}

.ref-list{list-style:none;padding:0;margin:0}
.ref-list li{
  font-family:'Source Serif 4',Georgia,serif;
  font-size:13.5px;color:var(--dim);line-height:1.7;
  padding:10px 0;border-bottom:1px solid var(--rule);
}
.ref-list li:last-child{border-bottom:none}

a.src-link{
  color:var(--accent);text-decoration:none;
  border-bottom:1px solid rgba(29,53,87,0.25);
  transition:border-color 0.15s;
}
a.src-link:hover{border-bottom-color:var(--accent)}

.rule{border:none;border-top:1px solid var(--border);margin:28px 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp 0.35s ease-out forwards}
.ad1{animation-delay:0.05s;opacity:0}
.ad2{animation-delay:0.10s;opacity:0}
.ad3{animation-delay:0.15s;opacity:0}
.ad4{animation-delay:0.20s;opacity:0}

.page{max-width:760px;margin:0 auto;padding:48px 28px 40px}
.page-wide{max-width:880px;margin:0 auto;padding:48px 28px 40px}

.page-kicker{font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
.page-title{font-size:32px;line-height:1.15;margin-bottom:8px;font-weight:700;letter-spacing:-0.02em}
.page-lede{font-family:'Source Serif 4',Georgia,serif;font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:28px;font-style:italic}

.hero{padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.hero-kicker{font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.hero-title{font-size:44px;line-height:1.1;font-weight:700;letter-spacing:-0.025em;margin-bottom:14px;color:var(--ink)}
.hero-lede{font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.6;color:var(--dim);max-width:640px}

.section-h{font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin:32px 0 14px}

.theory-note{margin-top:14px;padding:14px 16px;background:var(--bg-panel);border-radius:6px;border-left:3px solid var(--accent-border)}
.theory-note-label{font-size:10.5px;font-weight:600;letter-spacing:0.06em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
.theory-note ul{margin:0;padding:0;list-style:none}
.theory-note li{font-size:12.5px;color:var(--dim);line-height:1.65;padding:4px 0}
.theory-note li strong{color:var(--ink);font-weight:600}

.gameability-note{margin-top:10px;padding:12px 16px;background:#fafaf8;border-radius:6px;border:1px dashed rgba(120,113,108,0.3)}

.map-title{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--ink);margin:0 0 10px 0;letter-spacing:-0.01em}
.map-lede{font-family:'Source Serif 4',Georgia,serif;font-size:13.5px;line-height:1.65;color:var(--dim);margin:0 0 18px 0}
.map-caption{font-family:'Source Serif 4',Georgia,serif;font-size:12px;line-height:1.6;color:var(--muted);margin:18px 0 0 0;font-style:italic}

.gameability-explainer{background:#fafaf8;border-left:3px solid var(--accent);border-radius:4px;padding:16px 18px;margin:0 0 22px 0}
.gx-headline{font-family:'Source Serif 4',Georgia,serif;font-size:14px;line-height:1.6;color:var(--ink);margin:0 0 12px 0}
.gx-example{font-family:'Source Serif 4',Georgia,serif;font-size:13.5px;line-height:1.65;color:var(--dim);margin:0 0 12px 0;padding:10px 14px;background:#fff;border-radius:4px;border:1px solid var(--rule)}
.gx-takeaway{font-family:'Source Serif 4',Georgia,serif;font-size:13.5px;line-height:1.65;color:var(--ink);margin:0 0 10px 0}
.gx-source{font-family:'Source Serif 4',Georgia,serif;font-size:12.5px;line-height:1.6;color:var(--muted);margin:0;font-style:italic}

.lane-chart{display:flex;flex-direction:column;gap:14px}
.lane{padding:14px 16px 12px 16px;border-radius:6px;border:1px solid var(--rule)}
.lane-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.lane-dot{display:inline-block;width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:5px}
.lane-title{font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.lane-count{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--muted);margin-left:2px}
.lane-sub{font-family:'Source Serif 4',Georgia,serif;font-size:12.5px;line-height:1.55;color:var(--dim);margin-top:3px}
.lane-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.ind-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid var(--rule);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;transition:border-color 0.15s,box-shadow 0.15s,transform 0.05s;color:inherit}
.ind-pill:hover{border-color:var(--accent-border);box-shadow:0 1px 3px rgba(29,53,87,0.08)}
.ind-pill:active{transform:translateY(1px)}
.ind-pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.ind-pill-code{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.04em;background:rgba(29,53,87,0.06);padding:2px 6px;border-radius:3px;flex-shrink:0}
.ind-pill-name{font-size:13px;font-weight:500;color:var(--ink)}
.ind-pill-fam{font-size:11.5px;color:var(--muted);font-style:italic;margin-left:auto;padding-left:6px}
@media(max-width:720px){
  .ind-pill-fam{display:none}
  .ind-pill{min-height:44px}
}
.gameability-label{font-size:10.5px;font-weight:600;letter-spacing:0.06em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.gameability-text{font-size:12.5px;color:var(--dim);line-height:1.6;margin:0;font-family:'Source Serif 4',Georgia,serif}
.gameability-cite{font-size:11.5px;color:var(--muted);line-height:1.5;margin:8px 0 0 0;font-family:'Source Serif 4',Georgia,serif}
.cite-list{font-size:12.5px;color:var(--dim);line-height:1.6;margin:14px 0 0 0;font-family:'Source Serif 4',Georgia,serif;padding-top:10px;border-top:1px solid var(--rule)}
.cite-list strong{color:var(--ink)}

.abbr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-top:6px}
.abbr-item{display:flex;align-items:center;gap:10px;padding:6px 0;font-family:'Source Serif 4',Georgia,serif;font-size:13px;color:var(--dim);border-bottom:1px solid rgba(232,230,220,0.5)}
.abbr-item:last-child,.abbr-item:nth-last-child(2){border-bottom:none}
.abbr-item strong{color:var(--ink);font-weight:500;flex:1;font-family:'Inter',sans-serif;font-size:13px}
.abbr-tag{font-family:'Inter',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:0.04em;color:var(--accent);background:var(--accent-light,rgba(29,53,87,0.08));padding:2px 8px;border-radius:3px;flex-shrink:0;border:1px solid rgba(29,53,87,0.12)}
@media(max-width:720px){
  .abbr-grid{grid-template-columns:1fr}
  .abbr-item{border-bottom:1px solid rgba(232,230,220,0.5)!important}
}
.game-chip{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid}
.game-chip.game-low{background:rgba(74,93,71,0.08);color:#3d4f3a;border-color:rgba(74,93,71,0.25)}
.game-chip.game-moderate{background:rgba(133,77,14,0.06);color:#854d0e;border-color:rgba(133,77,14,0.25)}
.game-chip.game-high{background:rgba(122,62,45,0.06);color:#7a3e2d;border-color:rgba(122,62,45,0.25)}
.game-chip.game-high-in-llms{background:rgba(122,62,45,0.08);color:#7a3e2d;border-color:rgba(122,62,45,0.3)}
.game-chip.game-uncertain{background:rgba(120,113,108,0.08);color:var(--muted);border-color:rgba(120,113,108,0.25)}

.overlap-note{margin-top:10px;padding:12px 16px;background:#fafaf8;border-radius:6px;border:1px dashed rgba(120,113,108,0.3)}
.overlap-label{font-size:10.5px;font-weight:600;letter-spacing:0.06em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.overlap-note ul{margin:0;padding:0;list-style:none}
.overlap-note li{font-size:12.5px;color:var(--dim);line-height:1.6;padding:6px 0;border-bottom:1px solid rgba(120,113,108,0.12)}
.overlap-note li:last-child{border-bottom:none}
.overlap-note li strong{color:var(--ink);font-weight:600}
.overlap-fw{display:block;font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px;font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0}

.page-nav{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  margin-top:28px;padding-top:20px;border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.page-nav .pn-spacer{flex:1}

.footer{
  max-width:1080px;margin:32px auto 0;padding:24px 28px 40px;
  border-top:1px solid var(--border);
  font-size:12px;color:var(--muted);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.footer-authors{font-weight:500;color:var(--dim)}
.footer-context{color:var(--muted)}
.footer-context a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(29,53,87,0.25)}

.skip-link{
  position:absolute;left:-9999px;top:0;
  background:var(--accent);color:#fff;padding:10px 16px;
  border-radius:0 0 6px 0;font-size:13px;font-weight:500;z-index:100;
}
.skip-link:focus{left:0}

@media(max-width:720px){
  .grid-2{grid-template-columns:1fr!important}
  .hero-title{font-size:32px}
  .page-title{font-size:26px}
  .hide-m{display:none}
  .topbar-inner{padding:12px 18px;gap:8px}
  .brand-sub{display:none}
  .top-meta{font-size:10px}
  .card{padding:22px}
  .page,.page-wide{padding:28px 18px 40px}
  .chev{font-size:18px;padding:4px;margin-left:6px}
  .exp-card{padding:16px 18px!important}
  .exp-card button{min-height:44px}
}

@media print{
  .topbar,.page-nav,.back-btn,.footer,.bg-paper,.skip-link{display:none!important}
  body{background:white}
  .card,.card-plain,.card-accent,.exp-card,.est-card,.nav-card,.exp-opt{
    break-inside:avoid;box-shadow:none;border:1px solid #ccc;
  }
  .page,.page-wide{max-width:100%;padding:0}
  a.src-link{color:black;border-bottom:none}

var STANCES=[
{id:"gwt",name:"Global Workspace Theory",short:"GWT",
 cite:"Baars 1988; Dehaene 2014; Cogitate 2025",
 cite_links:[{label:"Cogitate 2025 (Nature)",url:"https://doi.org/10.1038/s41586-025-08888-1"},{label:"Dehaene 2017",url:"https://doi.org/10.1126/science.aan8871"}],
 short_desc:"Consciousness arises when information is broadcast across a limited-capacity workspace accessible to specialised modules.",
 long_desc:"Formulated by Bernard Baars and developed experimentally by Stanislas Dehaene and colleagues. On this account, information becomes conscious when it gains access to a limited-capacity broadcast system available to many downstream processes. The theory has the most developed implementation literature of any major consciousness theory. The Cogitate Consortium adversarial collaboration (Nature, 642:133\u2013142, 2025) tested predictions of Global Neuronal Workspace Theory against Integrated Information Theory and partially supported GNWT while challenging specific predictions. Substrate-neutral."},
{id:"rpt",name:"Recurrent Processing Theory",short:"RPT",
 cite:"Lamme 2006, 2020",
 cite_links:[{label:"Lamme 2006",url:"https://doi.org/10.1016/j.tics.2006.09.001"}],
 short_desc:"Recurrent feedback loops within neural circuits are necessary and sufficient for phenomenal consciousness.",
 long_desc:"Victor Lamme's theory holds that recurrent feedforward\u2013feedback processing within neural circuits is necessary and sufficient for phenomenal consciousness. On this view, standard feedforward networks and pure transformer inference are disqualified. Substrate status is ambiguous in the primary literature: the theory is grounded in biological neural dynamics, but its computational description is in principle substrate-neutral."},
{id:"hot",name:"Higher-Order Theories",short:"HOT",
 cite:"Rosenthal 2005; Lau & Rosenthal 2011",
 cite_links:[{label:"Lau & Rosenthal 2011",url:"https://doi.org/10.1016/j.tics.2011.05.009"},{label:"Butlin et al. 2025",url:"https://doi.org/10.1016/j.tics.2025.10.011"}],
 short_desc:"A mental state becomes conscious when the system forms a concurrent representation of that state.",
 long_desc:"A family of theories associated with David Rosenthal and Hakwan Lau. A mental state becomes conscious when the system forms a concurrent, non-inferential higher-order representation of it. Current large language models exhibit partial metacognitive capabilities such as calibrated uncertainty and self-correction, though the extent to which this constitutes genuine higher-order representation remains debated. Recent empirical work on LLM metacognition is surveyed in Butlin et al. (2025). Substrate-neutral."},
{id:"ast",name:"Attention Schema Theory",short:"AST",
 cite:"Graziano 2013; Wilterson & Graziano 2021",
 cite_links:[{label:"Wilterson & Graziano 2021",url:"https://doi.org/10.1073/pnas.2102421118"}],
 short_desc:"Consciousness is the brain's internal model of its own attentional processes.",
 long_desc:"Michael Graziano's theory holds that the brain constructs a simplified internal model of its own attentional processes, and that this model is what we call consciousness. Wilterson and Graziano (2021, PNAS 118:e2102421118) showed that an artificial deep Q-learning agent equipped with an attention schema outperformed one without, providing one of the clearest direct empirical tests of the theory in a computational system. Among the major theories, AST is probably the most directly engineerable. Substrate-neutral."},
{id:"pp",name:"Predictive Processing",short:"PP",
 cite:"Clark 2013; Seth 2021; Laukkonen et al. 2025",
 cite_links:[{label:"Laukkonen et al. 2025",url:"https://doi.org/10.1016/j.neubiorev.2025.106296"}],
 short_desc:"Perception and, on some accounts, consciousness as variational Bayesian inference.",
 long_desc:"A framework treating perception as variational Bayesian inference, extended by some theorists into an account of consciousness. Andy Clark developed the general computational story. Anil Seth's interoceptive inference account and the Laukkonen, Friston & Chandaria \u201CBeautiful Loop\u201D paper (2025, Neuroscience & Biobehavioral Reviews 176:106296) build consciousness-specific claims on top of it. Seth has moved toward strong embodiment constraints, arguing consciousness requires an organism modelling its own biological states. Substrate status is contested within the predictive processing community."},
{id:"ae",name:"Agency and Embodiment",short:"AE",
 cite:"Long, Sebo et al. 2024",
 cite_links:[{label:"Long, Sebo et al. 2024",url:"https://arxiv.org/abs/2411.00986"}],
 short_desc:"Robust agency as an independent route to moral patienthood, not requiring consciousness.",
 long_desc:"Long, Sebo, and colleagues (2024) argue for robust agency as a second, independent route to moral patienthood that does not require consciousness. The argument rests on desire-satisfaction welfare theory: a system with desires has a life that goes better or worse as those desires are satisfied or frustrated. Three levels are distinguished: intentional agency (goals via beliefs and desires), reflective agency (endorsement of one's own mental states), and rational agency (principled assessment of beliefs and desires). Particularly relevant for reinforcement learning systems and language agents."},
{id:"iwmt",name:"Integrated World Modelling Theory",short:"IWMT",
 cite:"Safron 2020, 2022",
 cite_links:[{label:"Safron 2020",url:"https://doi.org/10.3389/frai.2020.00030"}],
 short_desc:"Synthesis of Integrated Information Theory and Global Neuronal Workspace under the Free Energy Principle.",
 long_desc:"Adam Safron's synthesis of Integrated Information Theory and Global Neuronal Workspace Theory within Karl Friston's Free Energy Principle. The theory maps onto machine learning architectures: predictive hierarchies correspond to variational autoencoders, multimodal integration to shared latent spaces, spatial and somatic modelling to graph neural networks. Substrate-neutral in principle but requires embodied agency, which excludes pure text-processing systems."},
{id:"bio",name:"Biological Naturalism",short:"BioNat",
 cite:"Searle 1992; Seth 2025 (Noema)",
 cite_links:[{label:"Seth 2025 (Noema)",url:"https://www.noemamag.com/conscious-ai-is-the-second-coming-of-snake-oil/"}],
 short_desc:"Consciousness depends on being alive; phenomenal selfhood requires interoceptive inference about bodily states.",
 long_desc:"Associated historically with John Searle and argued most forcefully in recent work by Anil Seth. Consciousness on this view depends on being alive, with phenomenal selfhood requiring interoceptive inference about bodily states. Seth (2025, Noema) argues that computational functionalism is increasingly shakily supported and that brains are not Turing machines made of meat in any sense that matters for consciousness. Serves as a principled anchor for very low probability estimates of digital consciousness."}
];
